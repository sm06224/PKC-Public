<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>Qwen3 Browser Chat (Direct Load)</title>
    <style>
        body { font-family: sans-serif; max-width: 700px; margin: 20px auto; background: #f0f2f5; }
        #chat-container { background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        #output { height: 450px; overflow-y: auto; border: 1px solid #ddd; padding: 15px; margin-bottom: 15px; background: #fafafa; white-space: pre-wrap; line-height: 1.6; }
        #input-area { display: flex; gap: 10px; }
        input { flex: 1; padding: 12px; border: 1px solid #ccc; border-radius: 6px; }
        button { padding: 10px 20px; background: #007bff; color: white; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; }
        button:disabled { background: #ccc; }
        #status { font-size: 0.8rem; color: #555; margin-top: 10px; background: #eef; padding: 8px; border-radius: 4px; }
    </style>
</head>
<body>

<div id="chat-container">
    <h2>Qwen3 1.5B Chat (Latest)</h2>
    <div id="output">Qwen3を読み込み中... 初回は1GB程度のロードが発生します。</div>
    <div id="input-area">
        <input type="text" id="user-input" placeholder="日本語で質問してね..." disabled>
        <button id="send-btn" disabled>送信</button>
    </div>
    <div id="status">Status: 準備中...</div>
</div>

<script type="module">
    import * as webllm from "https://esm.run/@mlc-ai/web-llm";

    const output = document.getElementById("output");
    const status = document.getElementById("status");
    const userInput = document.getElementById("user-input");
    const sendBtn = document.getElementById("send-btn");

    // モデル名とHugging Face上のパス
    const modelId = "Qwen3-1.5B-Instruct-q4f16_1-MLC";
    const modelUrl = "https://huggingface.co/mlc-ai/Qwen3-1.5B-Instruct-q4f16_1-MLC/resolve/main/";

    let engine;

    async function init() {
        try {
            status.innerText = "Status: WebGPUの初期化中...";
            
            // WebLLMにカスタムモデルリストを渡して初期化
            engine = await webllm.CreateMLCEngine(modelId, {
                model_list: [{
                    "model": modelUrl,
                    "model_id": modelId,
                    "model_lib": webllm.modelLibURLPrefix + webllm.modelVersion + "/Qwen2-1.5B-Instruct-q4f16_1-v1.wasm", // Qwen3は2.5/2と互換性のあるWASMで動くことが多いです
                }],
                initProgressCallback: (p) => {
                    status.innerText = `Status: ${p.text}`;
                }
            });

            output.innerText = "[システム] Qwen3のロードが完了しました！日本語で話しかけてみてください。\n";
            userInput.disabled = false;
            sendBtn.disabled = false;
        } catch (e) {
            output.innerText = `【エラー】読み込みに失敗しました。\n理由: ${e.message}\n\n※まだQwen3の公式MLC配布が完了していない場合は、Qwen2.5-1.5Bを試すと確実です。`;
            console.error(e);
        }
    }

    async function sendMessage() {
        const text = userInput.value.trim();
        if (!text) return;
        
        userInput.value = "";
        output.innerText += `\nあなた: ${text}\nAI: `;
        
        const messages = [
            { role: "system", content: "あなたは優秀で親切なAIアシスタントです。必ず日本語で回答してください。" },
            { role: "user", content: text }
        ];

        const chunks = await engine.chat.completions.create({ messages, stream: true });

        for await (const chunk of chunks) {
            const content = chunk.choices[0].delta.content || "";
            output.innerText += content;
            output.scrollTop = output.scrollHeight;
        }
        output.innerText += "\n";
    }

    sendBtn.onclick = sendMessage;
    userInput.onkeypress = (e) => { if(e.key === "Enter") sendMessage(); };
    init();
</script>
</body>
</html>
