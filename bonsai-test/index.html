<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>Gemma Browser Chat (Fixed)</title>
    <style>
        body { font-family: sans-serif; max-width: 700px; margin: 20px auto; background: #f0f2f5; }
        #chat-container { background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        #output { height: 400px; overflow-y: auto; border: 1px solid #ddd; padding: 15px; margin-bottom: 15px; background: #fafafa; white-space: pre-wrap; }
        #input-area { display: flex; gap: 10px; }
        input { flex: 1; padding: 10px; }
        button { padding: 10px 20px; background: #4285f4; color: white; border: none; border-radius: 5px; cursor: pointer; }
        button:disabled { background: #ccc; }
        #status { font-size: 0.8rem; color: #555; margin-top: 10px; line-height: 1.4; }
    </style>
</head>
<body>

<div id="chat-container">
    <h2>Gemma-2b Chat</h2>
    <div id="output">初期化中...（コンソールを確認してください）</div>
    <div id="input-area">
        <input type="text" id="user-input" placeholder="メッセージを入力..." disabled>
        <button id="send-btn" disabled>送信</button>
    </div>
    <div id="status">Status: 待機中...</div>
</div>

<script type="module">
    import * as webllm from "https://esm.run/@mlc-ai/web-llm";

    const output = document.getElementById("output");
    const status = document.getElementById("status");
    const userInput = document.getElementById("user-input");
    const sendBtn = document.getElementById("send-btn");

    // モデルID
    const modelId = "gemma-2b-it-q4f16_1-MLC";

    async function init() {
        try {
            status.innerText = "Status: WebGPUの準備とモデルの読み込みを開始...";
            
            // WebLLMに「どこからモデルと実行プログラムを持ってくるか」を明示的に教える
            const engine = await webllm.CreateMLCEngine(modelId, {
                initProgressCallback: (p) => {
                    status.innerText = `Status: ${p.text}`;
                    console.log(p.text);
                }
            });

            window.engine = engine; // 送信関数で使うためにグローバルに置く
            output.innerText = "[システム] 準備完了！\n";
            userInput.disabled = false;
            sendBtn.disabled = false;
        } catch (e) {
            output.innerText = "【エラー】起動できませんでした。\n理由: " + e.message;
            console.error(e);
        }
    }

    async function sendMessage() {
        const text = userInput.value.trim();
        if (!text) return;
        
        userInput.value = "";
        output.innerText += `\nあなた: ${text}\nAI: `;
        
        const chunks = await window.engine.chat.completions.create({
            messages: [
                // ここで「日本語で答えろ」と強く命令します
                { role: "system", content: "あなたは誠実で親切な日本人のアシスタントです。必ず日本語で回答してください。" },
                { role: "user", content: text }
            ],
            stream: true,
            temperature: 0.7, // 少し柔軟な回答にする
        });

        for await (const chunk of chunks) {
            const content = chunk.choices[0].delta.content || "";
            output.innerText += content;
            output.scrollTop = output.scrollHeight;
        }
        output.innerText += "\n";
    }

    sendBtn.onclick = sendMessage;
    userInput.onkeypress = (e) => { if(e.key === "Enter") sendMessage(); };

    init();
</script>
</body>
</html>
