<script type="module">
    import * as webllm from "https://esm.run/@mlc-ai/web-llm";

    const output = document.getElementById("output");
    const status = document.getElementById("status");
    const userInput = document.getElementById("user-input");
    const sendBtn = document.getElementById("send-btn");

    // --- 修正ポイント：ライブラリが標準対応しているモデルIDを指定 ---
    // 軽量で日本語も通りやすい Llama-3-8B の量子化版を指定します
    const selectedModel = "Llama-3-8B-Instruct-q4f16_1-MLC"; 

    let engine;

    async function init() {
        try {
            status.innerText = "Status: 初期化中...";
            
            // WebLLMエンジンの作成
            // 標準リストにないモデルを使う場合は、第2引数で明示的にAppConfigを渡す必要がありますが、
            // まずは標準対応しているモデルで導通確認を行います。
            engine = await webllm.CreateMLCEngine(selectedModel, {
                initProgressCallback: (report) => {
                    status.innerText = `Status: ${report.text}`;
                }
            });

            output.innerText = "[システム] 準備完了！チャットを開始できます。\n";
            userInput.disabled = false;
            sendBtn.disabled = false;
        } catch (e) {
            output.innerText = `エラーが発生しました: ${e.message}\n`;
            console.error(e);
        }
    }

    // （sendMessage関数は前のコードと同じでOKです）
    async function sendMessage() {
        const text = userInput.value;
        if (!text) return;
        userInput.value = "";
        output.innerText += `\nあなた: ${text}\nAI: `;
        const messages = [{ role: "user", content: text }];
        const chunks = await engine.chat.completions.create({ messages, stream: true });
        for await (const chunk of chunks) {
            const delta = chunk.choices[0].delta.content || "";
            output.innerText += delta;
            output.scrollTop = output.scrollHeight;
        }
        output.innerText += "\n";
    }

    sendBtn.onclick = sendMessage;
    userInput.onkeypress = (e) => { if (e.key === "Enter") sendMessage(); };
    init();
</script>
