<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Browser LLM Chat (Single HTML)</title>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; max-width: 800px; margin: 20px auto; background: #f0f2f5; line-height: 1.6; }
        #chat-container { background: white; padding: 25px; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.08); }
        h2 { color: #1a1a1a; border-bottom: 2px solid #eee; padding-bottom: 10px; }
        #output { height: 450px; overflow-y: auto; border: 1px solid #e0e0e0; border-radius: 8px; padding: 15px; margin-bottom: 15px; background: #fafafa; white-space: pre-wrap; font-size: 0.95em; }
        #input-area { display: flex; gap: 10px; }
        input { flex-grow: 1; padding: 12px; border: 1px solid #ccc; border-radius: 6px; outline: none; }
        input:focus { border-color: #007bff; }
        button { padding: 10px 20px; cursor: pointer; background: #007bff; color: white; border: none; border-radius: 6px; font-weight: bold; transition: background 0.2s; }
        button:hover { background: #0056b3; }
        button:disabled { background: #ccc; cursor: not-allowed; }
        #status { font-size: 0.85em; color: #666; margin-top: 10px; padding: 8px; background: #eef; border-radius: 4px; }
    </style>
</head>
<body>

<div id="chat-container">
    <h2>LLM Browser Chat</h2>
    <div id="output">【システム】エンジンの初期化をお待ちください...</div>
    <div id="input-area">
        <input type="text" id="user-input" placeholder="AIにメッセージを送る..." disabled>
        <button id="send-btn" disabled>送信</button>
    </div>
    <div id="status">Status: 準備中...</div>
</div>

<script type="module">
    import * as webllm from "https://esm.run/@mlc-ai/web-llm";

    const output = document.getElementById("output");
    const status = document.getElementById("status");
    const userInput = document.getElementById("user-input");
    const sendBtn = document.getElementById("send-btn");

    // Llama-3-8B の軽量版。初回実行時に約5GBのダウンロードが発生します。
    // より速く試したい場合は "Gemma-2b-it-q4f16_1-MLC" に書き換えてください。
    const selectedModel = "Llama-3-8B-Instruct-q4f16_1-MLC"; 

    let engine;

    async function init() {
        try {
            status.innerText = "Status: WebGPUを確認中...";
            
            engine = await webllm.CreateMLCEngine(selectedModel, {
                initProgressCallback: (report) => {
                    status.innerText = `Status: ${report.text}`;
                }
            });

            output.innerText = "[システム] モデルの準備が完了しました！チャットを開始してください。\n";
            userInput.disabled = false;
            sendBtn.disabled = false;
        } catch (e) {
            output.innerText = `エラーが発生しました: ${e.message}\n\n※WebGPUが有効なブラウザ(Chrome/Edge)を使用しているか確認してください。`;
            console.error(e);
        }
    }

    async function sendMessage() {
        const text = userInput.value.trim();
        if (!text) return;

        userInput.value = "";
        output.innerText += `\nあなた: ${text}\nAI: `;
        output.scrollTop = output.scrollHeight;

        try {
            const messages = [{ role: "user", content: text }];
            const chunks = await engine.chat.completions.create({ messages, stream: true });
            
            for await (const chunk of chunks) {
                const delta = chunk.choices[0].delta.content || "";
                output.innerText += delta;
                output.scrollTop = output.scrollHeight; 
            }
            output.innerText += "\n";
        } catch (err) {
            output.innerText += `\n[エラー] 生成に失敗しました: ${err.message}`;
        }
    }

    // ボタンクリックイベントの登録
    sendBtn.onclick = sendMessage;

    // Enterキーでも送信可能にする
    userInput.onkeypress = (e) => {
        if (e.key === "Enter" && !userInput.disabled) {
            sendMessage();
        }
    };

    // 初期化実行
    init();
</script>

</body>
</html>
